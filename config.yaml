sources:
  - name: APA(美国心理学会)
    base_url: https://www.apa.org
    list_url: https://www.apa.org/rss/news-rss.xml
    enabled: true
    content_type: academic
    credibility: academic
    source_type: rss
    selectors:
      title: title
      link: link
      date: pubDate
      summary: description

  - name: ScienceDaily(儿童发展)
    base_url: https://www.sciencedaily.com
    list_url: https://www.sciencedaily.com/rss/mind_brain/child_development.xml
    enabled: true
    content_type: research
    credibility: research
    source_type: rss
    selectors:
      title: title
      link: link
      date: pubDate
      summary: description

  - name: NIMH(美国精神卫生研究院)
    base_url: https://www.nimh.nih.gov
    list_url: https://www.nimh.nih.gov/news/science-news
    enabled: true
    content_type: research
    credibility: research
    selectors:
      list_container: div.views-row
      title: h3 a
      link: h3 a
      date: time
    article_selector:
      content: div.main-content
    pagination:
      pattern: '?page={page}'
      start: 1

  - name: Edutopia(教育心理学)
    base_url: https://www.edutopia.org
    list_url: https://www.edutopia.org/rss.xml
    enabled: true
    content_type: public
    credibility: high
    source_type: rss
    selectors:
      title: title
      link: link
      date: pubDate
      summary: description

  - name: 教育部
    base_url: https://www.moe.gov.cn
    list_url: https://www.moe.gov.cn/jyb_xwfb/
    enabled: false
    content_type: policy
    credibility: official
    selectors:
      list_container: div.news_list li
      title: a
      link: a
      date: span.date
    article_selector:
      content: div.article_content
    pagination:
      pattern: /jyb_xwfb/index_{page}.html
      start: 1

  - name: 中国心理学会
    base_url: https://www.cpsbeijing.org
    list_url: https://www.cpsbeijing.org/cms/show.action?category_id=3
    enabled: false
    content_type: academic
    credibility: academic
    selectors:
      list_container: ul.news-list li
      title: h4 a
      link: h4 a
      date: span.time
    article_selector:
      content: div.content
    pagination:
      pattern: /cms/show.action?category_id=3&pageNo={page}
      start: 1

  - name: 中国教育科学研究院
    base_url: https://www.nies.net.cn
    list_url: https://www.nies.net.cn/xwzx/
    enabled: false
    content_type: research
    credibility: research
    selectors:
      list_container: div.news-con ul li
      title: a
      link: a
      date: span
    article_selector:
      content: div.TRS_Editor
    pagination:
      pattern: /xwzx/index_{page}.html
      start: 1
llm:
  provider: deepseek
  model: deepseek-chat
  base_url: https://api.deepseek.com
  temperature_process: 0.3
  temperature_content: 0.7
  max_tokens: 4096
video:
  provider: volcengine
  default_duration: 15
  aspect_ratio: '9:16'
  max_generate_per_run: 3
  default_template: 清新治愈
publish:
  max_per_day: 1
  publish_hour: 18
  publish_minute: 0
  publish_window_minutes: 30
collection:
  lookback_days: 1
  max_concurrent_sources: 3
  request_timeout: 10
  max_list_pages: 1
